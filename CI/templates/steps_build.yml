steps:
- bash: |
    source azp-scripts/azp-helpers.sh
    print_section "Building baremetal helloworld for ${MACHINE}"
    cd ~/
    source openembedded-core/oe-init-build-env

    # Create baremetal multiconfig
    mkdir -p ./conf/multiconfig
    echo "BUILDCFG_VARS:append = \" TCLIBC\"" >> ./conf/local.conf
    echo "BBMULTICONFIG = \"bare pico\"" >> ./conf/local.conf

    # Newlib is default multiconfig
    echo "MACHINE = \"${MACHINE}\"" >> ./conf/local.conf
    echo "TCLIBC = \"newlib\"" >> ./conf/local.conf

    # Set up baremetal multiconfig
    echo "MACHINE = \"${MACHINE}\"" >> ./conf/multiconfig/bare.conf
    echo "TCLIBC = \"baremetal\"" >> ./conf/multiconfig/bare.conf
    echo "TMPDIR = \"\${TOPDIR}/tmp-${MACHINE}-baremetal\"" >> ./conf/multiconfig/bare.conf

    # Set up picolibc multiconfig
    echo "MACHINE = \"${MACHINE}\"" >> ./conf/multiconfig/pico.conf
    echo "TCLIBC = \"picolibc\"" >> ./conf/multiconfig/pico.conf
    echo "TMPDIR = \"\${TOPDIR}/tmp-${MACHINE}-picolibc\"" >> ./conf/multiconfig/pico.conf

    print_section "Building with the following configuration:"
    echo "local.conf:"
    tail -n 10 conf/local.conf
    echo ""
    echo "conf/multiconfig/bare.conf:"
    tail -n 10 conf/multiconfig/bare.conf
    echo ""
    echo "conf/multiconfig/pico.conf:"
    tail -n 10 conf/multiconfig/pico.conf

    if [ -z "${BBTARGET}" ]; then
        case "$MACHINE" in
            qemuarm|qemuarm64|qemuriscv32|qemuriscv64)
                export BBTARGET="mc::baremetal-helloworld mc:bare:baremetal-helloworld mc:pico:picolibc-helloworld"
                ;;
            *)
                export BBTARGET="mc::baremetal-helloworld mc:bare:baremetal-helloworld"
                ;;
        esac
    fi

    print_section "Running cmd: bitbake ${BBTARGET}"
    bitbake ${BBTARGET}

  condition: succeededOrFailed()
  displayName: 'Build baremetal images'

- bash: |
    source azp-scripts/azp-helpers.sh
    print_section "Moving artifacts to be deployed"

    rm -rf ${DEPLOY_ARTIFACTS_DIR}/*

    # Newlib artifacts
    export TCLIBC="newlib"
    files=$(find "/home/vsts/build/tmp/deploy/images/${MACHINE}" \
    \( -name "*.bin" -o -name "*.elf" -o -name "*.qemuboot.conf" -o -name "*.manifest" -o -name "*.iso" \) \
    ! -type l)

    [ -z "$files" ] && {
      echo "ERROR: No artifacts found"
      exit 1
    }

    for binfile in $files; do
      mv "$binfile" "${DEPLOY_ARTIFACTS_DIR}/${TCLIBC}-$(basename "$binfile")"
    done

    # Baremetal artifacts
    export TCLIBC="baremetal"
    files=$(find "/home/vsts/build/tmp-${MACHINE}-${TCLIBC}/deploy/images/${MACHINE}/" \
    \( -name "*.bin" -o -name "*.elf" -o -name "*.qemuboot.conf" -o -name "*.manifest" -o -name "*.iso" \) \
    ! -type l)

    [ -z "$files" ] && {
      echo "ERROR: No artifacts found"
      exit 1
    }

    for binfile in $files; do
      mv "$binfile" "${DEPLOY_ARTIFACTS_DIR}/${TCLIBC}-$(basename "$binfile")"
    done

    case "$MACHINE" in
        qemuarm|qemuarm64|qemuriscv32|qemuriscv64)
            # Picolibc artifacts
            export TCLIBC="picolibc"
            files=$(find "/home/vsts/build/tmp-${MACHINE}-${TCLIBC}/deploy/images/${MACHINE}/" \
                         \( -name "*.bin" -o -name "*.elf" -o -name "*.qemuboot.conf" -o -name "*.manifest" -o -name "*.iso" \) \
                         ! -type l)

            [ -z "$files" ] && {
                echo "ERROR: No artifacts found"
                exit 1
            }

            for binfile in $files; do
                mv "$binfile" "${DEPLOY_ARTIFACTS_DIR}/${TCLIBC}-$(basename "$binfile")"
            done
            ;;
        *)
            echo "Picolibc artifacts do not exist for this architecture"
            ;;
    esac

  condition: succeededOrFailed()
  displayName: 'Moving Artifacts'

- publish: $(DEPLOY_ARTIFACTS_DIR)
  artifact: $(MACHINE)
  condition: succeededOrFailed()

- publish: $(SSTATE_DIR)
  artifact: 'SState-${{parameters.machine}}'
  condition: succeededOrFailed()
